# Render Blueprint — CourseSlideGenerator 前端靜態站
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: course-slide-generator
    runtime: static
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
